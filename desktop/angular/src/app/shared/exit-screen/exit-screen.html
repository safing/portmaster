<div class="content-wrapper">
  <caption>{{ 'common.tip' | translate }}</caption>
  <fa-icon class="close-icon" icon="times" (click)="cancel()"></fa-icon>

  <h1>{{ 'dialogs.closeUI' | translate }}</h1>

  <span class="message">{{ 'dialogs.closeUIMessage' | translate }}</span>

  <div class="actions">
    <span>
      <input name="neveragain" id="neveragain" [(ngModel)]="neveragain" type="checkbox"> <label for="neveragain">{{ 'dialogs.neverShowAgain' | translate }}</label>
    </span>

    <button (click)="closeUI()" type="button">{{ 'dialogs.closeUIButton' | translate }}</button>
  </div>
</div>
