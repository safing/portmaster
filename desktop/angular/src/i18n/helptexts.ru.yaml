###########
### Пример

myKey:
  title: Пример подсказки
  content: |
    Это контент в формате Markdown.

    Это супер крутая новая фича, которая вам понравится!
    Она даже поддерживает Markdown:
    - упорядоченные списки
    - с несколькими элементами

    И :rocket: эмодзи

    ### :tada: :facepalm:
  url: https://docs.safing.io/?source=Portmaster
  urlText: Покажи!
  nextKey: navMonitor

##############
### Навигация

introTipup:
  title: Привет!
  content: |
    Спасибо за установку Portmaster.

intro:
  title: Подсказки Portmaster
  content: |
    Откройте подсказки, чтобы узнать как работает Portmaster.

    Такие подсказки можно найти по всему Portmaster. С некоторыми подсказками вы можете пройти тур по элементу или функции:
  nextKey: navShield

navShield:
  title: Щит статуса и Панель управления
  content: |
    Щит даёт общий обзор состояния Portmaster. Если он станет любого цвета кроме зелёного, ищите уведомление, которое объяснит что происходит.

    __Нажмите на щит, чтобы открыть панель управления.__
  nextKey: navMonitor

navMonitor:
  title: Монитор сети
  content: |
    Наблюдайте и исследуйте всё, что происходит на вашем устройстве.
  nextKey: navApps
  buttons:
    - name: Пройти тур
      action:
        Type: open-page
        Payload: monitor
      nextKey: networkMonitor

navApps:
  title: Настройки приложений
  content: |
    Настройте параметры для каждого приложения, которые переопределяют глобальные настройки.
  nextKey: navMap
  buttons:
    - name: Пройти тур
      action:
        Type: open-page
        Payload: apps
      nextKey: appsTitle

navMap:
  title: Карта SPN
  content: |
    Просматривайте карту SPN и видите как маршрутизируются ваши соединения.
  nextKey: navSettings

navSettings:
  title: Глобальные настройки
  content: |
    Настройте глобальные параметры Portmaster.
  nextKey: navSupport
  buttons:
    - name: Пройти тур
      action:
        Type: open-page
        Payload: settings
      nextKey: globalSettings

navSupport:
  title: Помощь
  content: |
    Сообщите об ошибке, свяжитесь с поддержкой или просмотрите документацию Portmaster.
  nextKey: navTools
  buttons:
    - name: Открыть страницу
      action:
        Type: open-page
        Payload: support

navTools:
  title: Версия и инструменты
  content: |
    Просмотрите версию Portmaster и используйте специальные действия и инструменты.
  nextKey: navPause

navPause:
  title: Пауза и возобновление
  content: |
    Временно отключите защиту и мониторинг сети Portmaster.
    
    Выберите приостановку только SPN или отключите всю защиту полностью.
  nextKey: navPower

navPower:
  title: Выключение и перезапуск
  content: |
    Выключите или перезапустите Portmaster.
  nextKey: uiMode

uiMode:
  title: Режим интерфейса
  content: |
    Быстро изменяйте количество отображаемых настроек и информации.

    Скрытые настройки всё ещё действуют. После закрытия интерфейса режим возвращается к значению по умолчанию.
  buttons:
    - name: Изменить режим по умолчанию
      action:
        Type: "open-setting"
        Payload:
          Key: "core/expertiseLevel"

############
### Боковая панель

pilot-widget:
  title: Статус Portmaster
  content: |
    Этот щит показывает текущее состояние Portmaster:

    - 🟢 всё в порядке
    - 🟡 что-то не так, требуется внимание
    - 🔴 опасное состояние, требуется немедленная реакция

    Этот цветовой код также отображается в иконке в системном трее.

pilot-widget-NetworkRating:
  title: Рейтинг сети
  content: |
    Контролируйте свою конфиденциальность даже при подключении к новым сетям.

    В Portmaster вы настраиваете параметры, которые активны в одной среде, но не в другой — например, разрешаете конфиденциальные соединения дома, но не в публичной библиотеке.

    Всё, что вам нужно делать — это менять рейтинг сети при подключении к другой сети.
  nextKey: pilot-widget-NetworkRating-Trusted

pilot-widget-NetworkRating-Trusted:
  title: "Рейтинг сети: Доверенная"
  content: |
    Вы доверяете текущей сети и считаете её безопасной.

    Примеры:
     - ваша домашняя сеть
     - сеть доверенных друзей
  nextKey: pilot-widget-NetworkRating-Untrusted

pilot-widget-NetworkRating-Untrusted:
  title: "Рейтинг сети: Недоверенная"
  content: |
    Вы не доверяете текущей сети и сомневаетесь в её безопасности и конфиденциальности.

    Примеры:
     - публичный WiFi в кафе, библиотеке, поезде, отеле...
     - сеть родственника, не разбирающегося в технологиях
  nextKey: pilot-widget-NetworkRating-Danger

pilot-widget-NetworkRating-Danger:
  title: "Рейтинг сети: Опасная"
  content: |
    Вы считаете, что текущая сеть взломана или иным образом враждебна к вам.

    Примеры:
     - что-то подозрительное происходит в вашей домашней сети

    <small>_Примечание: При рейтинге "Опасная" Portmaster становится очень защитным. Это может нарушить работу приложений или сделать их бесполезными._</small>

broadcast-info:
  title: Широковещательные уведомления
  content: |
    Широковещательные уведомления — это публичные сообщения, загружаемые Portmaster при проверке обновлений.

    Затем Portmaster локально решает, какие сообщения следует отображать.
  url: https://github.com/safing/portmaster/issues/703
  urlText: Узнать больше

#############
### Панель управления

dashboardIntro:
  title: Панель управления
  content: |
    Панель управления даёт первый обзор активных функций Portmaster и того, что происходит на вашем устройстве.

    Если не указано иное, все графики и статистика основаны на данных за последние 10 минут и обновляются каждые 10 секунд.

########################
### Страница монитора сети

networkMonitor:
  title: Сетевая активность
  content: |
    Наблюдайте за всем, что происходит на вашем устройстве.

    Смотрите все сетевые соединения всех приложений и процессов, которые были активны за последние 10 минут. Нажмите на любое приложение или процесс для детального изучения.

networkMonitor-App-Focus-connection-history:
  title: Сетевая активность
  content: |
    Отслеживайте соединения по мере их появления. Нажмите на любое соединение, чтобы просмотреть детали и предпринять действия.
    <br /><br />
    <span class="inline-block">
      <span class="pill-container">
        <span class="counter">2k+</span>
        <span class="pill">
          <span class="percentage"></span>
        </span>
      </span>
    </span> <b>Сводка статуса</b>
    <br /><br />
    Сгруппированные соединения имеют цветную полосу, показывающую общее количество соединений и процентное соотношение между разрешёнными (зелёный) и заблокированными/неудачными (серый).
    <br /><br />
    Отдельное соединение имеет три состояния:<br />
    <span class="verdict accept"></span><span class="verdict accept outdated"></span> <b>Разрешено</b> <br />
    <span class="block verdict"></span><span class="block verdict outdated"></span> <b>Заблокировано</b> <br />
    <span class="verdict failed"></span><span class="verdict failed outdated"></span> <b>Ошибка</b> <br />

    Если кружок заполнен, ваши _текущие_ настройки разрешили или заблокировали соединение.<br />
    Если кружок пустой, _предыдущие_ настройки разрешили или заблокировали соединение.
    Ваши текущие настройки могут решить иначе.

########################
### Страница глобальных настроек

globalSettings:
  title: Глобальные настройки
  content: |
    Здесь вы можете установить общесистемные предпочтения и настроить правила по умолчанию для всех приложений и соединений.

    Легко создать более строгий глобальный набор правил, а затем создать исключения в настройках приложения, которые переопределяют глобальные значения по умолчанию.

#########################
### Страница настроек приложений

appsTitle:
  title: Обзор приложений
  content: |
    Все приложения или процессы, которые Portmaster видел активными в сети, перечислены здесь и могут быть настроены.

    Приложения категоризированы и появляются только один раз:

    - **Активные:** приложения, которые сейчас активны и видны в Мониторе сети
    - **Недавно использованные:** приложения, которые были активны в течение последней недели
    - **Недавно изменённые:** приложения, настройки которых изменялись в течение последней недели
    - **Другие:** все остальные приложения

appSettings:
  title: Настройки приложения
  content: |
    Здесь вы можете настроить параметры конкретного приложения, которые переопределяют глобальные настройки.

    Легко создать более строгий глобальный набор правил, а затем создать исключения в настройках приложения.
  nextKey: appSettings-Filter

appSettings-Filter:
  title: Режим отображения
  content: |
    Быстро меняйте, какие настройки отображаются:

    **Показать активные:**<br>
    Показывать только настройки приложения, которые переопределяют глобальные значения.

    **Показать все:**<br>
    Показать все настройки. Настройки приложения, которые переопределяют глобальные значения, выделены.

appSettings-QuickSettings:
  title: Быстрое изменение важных настроек
  content: |
    __Блокировать соединения__

    Установите действие по умолчанию, когда ничто другое не разрешает и не блокирует исходящее соединение.

    Когда другие настройки могут переопределить это, жёлтая точка рядом с переключателем сообщит о возможных исключениях.

    __SPN__

    Быстро включите или отключите SPN для этого приложения.

    Когда другие настройки могут переопределить это, жёлтая точка рядом с переключателем сообщит о возможных исключениях.

    __Сохранять историю__

    Сохраняйте соединения в базе данных (на диске), чтобы просматривать и искать их позже.
    
    Изменения могут занять несколько минут для применения ко всем соединениям.

#########################
### Страница поддержки

support-page-related-issues:
  title: Локальный поиск проблем
  content: |
    Публичные проблемы ищутся только локально, поэтому никакие данные не покидают ваше устройство, пока вы не решите иначе.

    Публичные GitHub issues загружаются через нашу систему поддержки, чтобы предотвратить раскрытие данных GitHub.

#########################
### Параметры конфигурации

spn:
  title: Сеть конфиденциальности Safing
  content: |
    Сеть конфиденциальности Safing (SPN) — это дополнение к Portmaster, которое защищает вашу личность
    и интернет-трафик от посторонних глаз. Она распределяет ваши соединения по нескольким серверам,
    позволяя вам выходить в интернет из множества мест одновременно, чтобы эффективно скрыть
    ваши следы.
  url: https://safing.io/spn/?source=Portmaster
  urlText: Узнать больше

###########################
# Сопоставление процессов и отпечатки
process-tags:
  title: Теги процессов
  content: Теги содержат специальные метаданные процессов и собираются Portmaster. Вы можете использовать эти теги в отпечатках для лучшего сопоставления процессов, которые иначе было бы сложно или невозможно правильно идентифицировать.
